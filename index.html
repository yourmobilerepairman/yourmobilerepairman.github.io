<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Closed Permanently</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-top: 4px solid #dc3545; /* Subtle red top border */
        }

        .status-badge {
            display: inline-block;
            background-color: #f8d7da;
            color: #721c24;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: #212529;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #6c757d;
            margin-bottom: 24px;
        }

        hr {
            border: 0;
            border-top: 1px solid #dee2e6;
            margin-bottom: 24px;
        }

        .contact-info {
            font-size: 0.95rem;
            color: #495057;
        }

        .contact-info a {
            color: #0056b3;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Permanent Closure</div>

        <h1>Our Doors Have Closed</h1>
    </div>

</body>
</html>
